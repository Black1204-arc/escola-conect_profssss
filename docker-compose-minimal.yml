version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: escolaconnect-db
    environment:
      POSTGRES_USER: escolaconnect
      POSTGRES_PASSWORD: escolaconnect123
      POSTGRES_DB: escolaconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "escolaconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: escolaconnect-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
