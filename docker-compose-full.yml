version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: escolaconnect-postgres
    environment:
      POSTGRES_USER: escolaconnect
      POSTGRES_PASSWORD: escolaconnect123
      POSTGRES_DB: escolaconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "escolaconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - escolaconnect

  # Adminer for database management
  adminer:
    image: adminer:latest
    container_name: escolaconnect-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - escolaconnect

  # Full App - Backend + Frontend (tudo junto)
  app:
    build:
      context: .
      dockerfile: Dockerfile-full
    container_name: escolaconnect-app
    ports:
      - "3000:3000"   # Frontend
      - "8001:8001"   # Backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://escolaconnect:escolaconnect123@postgres:5432/escolaconnect"
      JWT_SECRET: "dev_secret_key_change_in_production"
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:8001/api"
    networks:
      - escolaconnect

volumes:
  postgres_data:

networks:
  escolaconnect:
    driver: bridge
